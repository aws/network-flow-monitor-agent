# Create Amazon CloudWatch Network Flow Monitor Agent DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.daemonSet.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aws-network-flow-monitor-agent.labels" . | nindent 4}}
spec:
  selector:
    matchLabels:
      name: {{ .Values.daemonSet.name }}
      {{- if .Values.podLabels }}
      {{ toYaml .Values.podLabels | indent 6 }}
      {{- end }}
  template:
    metadata:
      {{- if .Values.podAnnotations }}
      annotations:
      {{- range $key, $value := .Values.podAnnotations }}
        {{ $key }}: {{ $value | quote }}
      {{- end }}
      {{- end }}
      labels:
        name: {{ .Values.daemonSet.name }}
        {{- if .Values.podLabels }}
        {{ toYaml .Values.podLabels | indent 8 }}
        {{- end }}
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: setup
          image: {{ include "aws-network-flow-monitor-agent.image" . }}
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              set -e
              # Configure rmem_max and aim to hold more Netfilter Conntrack Messages
              CURRENT=$(sysctl -n net.core.rmem_max)
              REQUIRED={{ int .Values.rmemMax }}
              echo "Current rmem_max: $CURRENT"
              # Save original value for restoration on pod exit
              echo $CURRENT > /config/rmem_max_original
              if [ "$CURRENT" -lt "$REQUIRED" ]; then
                sysctl -w net.core.rmem_max=$REQUIRED
                echo "Updated rmem_max to: $REQUIRED"
              else
                echo "rmem_max "$CURRENT" is already sufficient, keeping current value"
              fi
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: {{ .Values.daemonSet.name }}
          image: {{ include "aws-network-flow-monitor-agent.image" . }}
          securityContext:
            seLinuxOptions:
              type: control_t
            capabilities:
              add:
                - BPF
                - NET_ADMIN
                - PERFMON
                {{- if eq .Values.env.OPEN_METRICS "on" }}
                - SYS_ADMIN
                - SYS_PTRACE
                {{- end }}
              drop:
                - ALL
          resources: {{ toYaml .Values.resources | nindent 12 }}
          {{- if eq .Values.env.OPEN_METRICS "on" }}
          ports:
            - name: metrics
              containerPort: {{ .Values.env.OPEN_METRICS_PORT | int }}
              protocol: TCP
          {{- end }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.caCerts.enabled }}
            - name: AWS_CA_BUNDLE
              value: {{ .Values.caCerts.mountPath }}/{{ .Values.caCerts.fileName }}
            - name: SSL_CERT_FILE
              value: {{ .Values.caCerts.mountPath }}/{{ .Values.caCerts.fileName }}
            {{- end }}
          volumeMounts:
            - name: host-cgroup
              mountPath: /host-cgroup
              readOnly: true
          {{- if eq .Values.env.OPEN_METRICS "on" }}
            - name: kubelet-pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
          {{- end }}
          {{- if .Values.caCerts.enabled }}
            - name: ca-bundle
              mountPath: {{ .Values.caCerts.mountPath }}/{{ .Values.caCerts.fileName }}
              subPath: {{ .Values.caCerts.fileName }}
              readOnly: true
          {{- end }}
        - name: cleanup
          # Restores net.core.rmem_max on pod termination.
          image: {{ include "aws-network-flow-monitor-agent.image" . }}
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              trap '
                if [ -f /config/rmem_max_original ]; then
                  ORIGINAL=$(cat /config/rmem_max_original)
                  echo "Restoring rmem_max to: $ORIGINAL"
                  sysctl -w net.core.rmem_max=$ORIGINAL && echo "Restored rmem_max" || echo "Failed to restore rmem_max"
                fi
              ' TERM
              sleep infinity &
              wait
          resources:
            limits:
              cpu: 10m
              memory: 16Mi
            requests:
              cpu: 1m
              memory: 8Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: host-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: config
          emptyDir: {}
      {{- if eq .Values.env.OPEN_METRICS "on" }}
        - name: kubelet-pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
            type: Directory
      {{- end }}
      {{- if .Values.caCerts.enabled }}
        - name: ca-bundle
          secret:
            secretName: {{ .Values.caCerts.secretName }}
            {{- if .Values.caCerts.secretKey }}
            items:
              - key: {{ .Values.caCerts.secretKey }}
                path: {{ .Values.caCerts.fileName }}
            {{- end }}
      {{- end }}
      nodeSelector:
        kubernetes.io/os: linux
      terminationGracePeriodSeconds: 30
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
